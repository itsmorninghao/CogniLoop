{% extends "slide_base.html" %}
{% block content %}
<div style="flex: 1; display: flex; flex-direction: column; gap: 28px;">
  <h2>{{ heading }}</h2>
  <div class="divider"></div>
  <div class="two-col" style="flex: 1;">
    <div class="card">
      <h3 style="color: var(--primary-light); margin-bottom: 20px;">{{ left_label }}</h3>
      <ul class="bullet-list">
        {% for item in left_items %}
        <li style="font-size: 20px;">{{ item }}</li>
        {% endfor %}
      </ul>
    </div>
    <div class="card" style="border-color: rgba(139,92,246,0.3);">
      <h3 style="color: #a78bfa; margin-bottom: 20px;">{{ right_label }}</h3>
      <ul class="bullet-list">
        {% for item in right_items %}
        <li style="font-size: 20px;">{{ item }}</li>
        {% endfor %}
      </ul>
    </div>
  </div>
</div>
{% endblock %}
