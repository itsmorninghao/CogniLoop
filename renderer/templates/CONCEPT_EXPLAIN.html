{% extends "slide_base.html" %}
{% block content %}
<div style="flex: 1; display: flex; flex-direction: column; gap: 28px;">
  <h2>{{ heading }}</h2>
  <div class="divider"></div>
  <div class="card" style="flex: 1;">
    <div style="display: flex; flex-direction: column; gap: 20px; height: 100%;">
      <div>
        <div class="badge" style="margin-bottom: 12px;">定义</div>
        <p>{{ definition }}</p>
      </div>
      {% if analogy %}
      <div style="margin-top: auto;">
        <div class="highlight">
          <p style="color: var(--primary-light); font-size: 18px; margin-bottom: 8px; font-weight: 500;">💡 类比理解</p>
          <p style="font-size: 21px;">{{ analogy }}</p>
        </div>
      </div>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
