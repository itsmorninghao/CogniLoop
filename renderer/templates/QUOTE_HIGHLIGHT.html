{% extends "slide_base.html" %}
{% block content %}
<div style="flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 36px;">
  <div class="highlight" style="padding: 40px 48px;">
    <p style="font-size: 30px; font-weight: 500; line-height: 1.5; color: var(--text);">"{{ quote }}"</p>
  </div>
  {% if emphasis %}
  <div style="padding: 0 8px;">
    <p style="color: var(--muted); font-size: 20px;">{{ emphasis }}</p>
  </div>
  {% endif %}
</div>
{% endblock %}
