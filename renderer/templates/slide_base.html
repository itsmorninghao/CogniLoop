<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary: #6366f1;
    --primary-light: #818cf8;
    --primary-dark: #4f46e5;
    --bg: #0a0a0f;
    --card: #13131a;
    --border: rgba(255,255,255,0.1);
    --text: #f1f5f9;
    --muted: #717182;
    --success: #10b981;
    --warning: #f59e0b;
  }

  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .slide {
    width: 1280px;
    height: 720px;
    position: relative;
    display: flex;
    flex-direction: column;
    padding: 60px 80px;
    background: linear-gradient(135deg, #0a0a0f 0%, #13131a 100%);
    overflow: hidden;
  }

  /* Decorative elements */
  .slide::before {
    content: '';
    position: absolute;
    top: -200px;
    right: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
    border-radius: 50%;
  }

  .slide::after {
    content: '';
    position: absolute;
    bottom: -150px;
    left: -150px;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(139,92,246,0.1) 0%, transparent 70%);
    border-radius: 50%;
  }

  /* Brand accent bar */
  .accent-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--primary) 0%, #8b5cf6 50%, #ec4899 100%);
  }

  /* Typography */
  .slide-number {
    position: absolute;
    bottom: 30px;
    right: 80px;
    font-size: 14px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  h1 { font-size: 52px; font-weight: 600; line-height: 1.2; }
  h2 { font-size: 38px; font-weight: 600; line-height: 1.3; }
  h3 { font-size: 28px; font-weight: 500; line-height: 1.4; }
  p  { font-size: 22px; font-weight: 400; line-height: 1.6; }

  .gradient-text {
    background: linear-gradient(135deg, var(--primary-light), #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 4px 12px;
    background: rgba(99,102,241,0.2);
    border: 1px solid rgba(99,102,241,0.4);
    border-radius: 20px;
    font-size: 14px;
    color: var(--primary-light);
    font-weight: 500;
  }

  /* Bullet list */
  .bullet-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .bullet-list li {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    font-size: 24px;
    line-height: 1.5;
  }

  .bullet-list li::before {
    content: '';
    flex-shrink: 0;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--primary);
    margin-top: 10px;
    box-shadow: 0 0 8px rgba(99,102,241,0.6);
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
  }

  /* Two-column grid */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
  }

  /* Highlight box */
  .highlight {
    background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(139,92,246,0.1));
    border: 1px solid rgba(99,102,241,0.3);
    border-left: 4px solid var(--primary);
    border-radius: 12px;
    padding: 28px 36px;
  }

  /* Divider */
  .divider {
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, var(--primary), #8b5cf6);
    border-radius: 2px;
    margin: 20px 0;
  }
</style>
{% block extra_styles %}{% endblock %}
</head>
<body>
<div class="slide">
  <div class="accent-bar"></div>
  {% block content %}{% endblock %}
  <span class="slide-number">{{ slide_index + 1 }} / {{ total_slides }}</span>
</div>
</body>
</html>
